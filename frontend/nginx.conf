server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    include /etc/nginx/mime.types;

    # nginx'in varsayılan mime.types dosyası .mjs uzantısını tanımıyor.
    # PDF.js worker'ı .mjs olarak servis edildiği için tarayıcı bunu
    # doğru MIME type olmadan modül olarak kabul etmiyor.
    types {
        application/javascript mjs;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
